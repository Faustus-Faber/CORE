services:
  # Backend API
  - type: web
    name: core-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3
      - key: GROQ_QWEN_MODEL
        value: qwen/qwen3-32b
      - key: AI_REQUEST_TIMEOUT_MS
        value: 20000
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: OCR_PROVIDER
        value: ocrspace
      - key: OCR_SPACE_API_KEY
        sync: false
      - key: OCR_SPACE_ENDPOINT
        value: https://api.ocr.space/parse/image
      - key: OCR_REQUEST_TIMEOUT_MS
        value: 30000

  # Frontend Static Site
  - type: web
    name: core-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
